services:
  postgres:
    image: postgres:16-alpine
    container_name: hsc-postgres
    restart: no
    environment:
      POSTGRES_USER: hsc
      POSTGRES_PASSWORD: hsc
      POSTGRES_DB: hsc_chat
    volumes:
      - hsc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsc -d hsc_chat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  searxng:
    # Pin digest to avoid JSON serialization regressions in floating :latest
    image: searxng/searxng@sha256:77b6ec55d5176fc47cfe91df5e182393133305358741d0c80ebbeec75ac39f99
    container_name: hsc-searxng
    restart: no
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  hsc-chat:
    build: .
    container_name: hsc-chat
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - PORT=${PORT:-8080}
      - PUBLIC_DIR=${PUBLIC_DIR:-/app/public}
      - DATABASE_URL=${DATABASE_URL:-postgres://hsc:hsc@postgres:5432/hsc_chat}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SEARCH_LIMIT=${SEARCH_LIMIT:-5}
      - EXTRACT_LIMIT=${EXTRACT_LIMIT:-3}
      - EXTRACT_TIMEOUT_MS=${EXTRACT_TIMEOUT_MS:-5000}
      - SEARCH_CACHE_TTL_MS=${SEARCH_CACHE_TTL_MS:-300000}
      - SEARCH_SNIPPET_ONLY=${SEARCH_SNIPPET_ONLY:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

volumes:
  hsc_pg_data:
