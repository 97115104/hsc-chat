services:
  hsc-chat:
    build: .
    container_name: hsc-chat
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - PUBLIC_DIR=/app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
